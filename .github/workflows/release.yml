name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive app
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild archive \
            -project codexStack.xcodeproj \
            -scheme codexStack \
            -configuration Release \
            -archivePath "build/codexStack.xcarchive" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package zip
        run: |
          rm -rf dist
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            "build/codexStack.xcarchive/Products/Applications/codexStack.app" \
            "dist/codexStack-${{ github.ref_name }}-macos.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codexStack-${{ github.ref_name }}-macos.zip
          generate_release_notes: true
