name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product codexStack

      - name: Create app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="codexStack"
          BUNDLE_DIR="dist/${APP_NAME}.app"
          CONTENTS_DIR="${BUNDLE_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"

          rm -rf dist
          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"

          cp ".build/release/${APP_NAME}" "${MACOS_DIR}/${APP_NAME}"
          cp "Sources/codexStack/Resources/Assets/codexStack-logo.png" "${RESOURCES_DIR}/codexStack-logo.png"
          cp -R ".build/release/codexStack_codexStack.bundle" "${BUNDLE_DIR}/codexStack_codexStack.bundle"

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>codexStack</string>
            <key>CFBundleExecutable</key>
            <string>codexStack</string>
            <key>CFBundleIdentifier</key>
            <string>dev.codexstack.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>codexStack</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>__VERSION__</string>
            <key>CFBundleVersion</key>
            <string>__VERSION__</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          VERSION="${GITHUB_REF_NAME#v}"
          perl -pi -e "s/__VERSION__/${VERSION}/g" "${CONTENTS_DIR}/Info.plist"
          chmod +x "${MACOS_DIR}/${APP_NAME}"

      - name: Package zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent codexStack.app codexStack-${{ github.ref_name }}-macos.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codexStack-${{ github.ref_name }}-macos.zip
          generate_release_notes: true
